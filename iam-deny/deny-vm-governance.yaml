rules:
  - denyRule:
      deniedPrincipals:
        - "principalSet://goog/public:all"

      exceptionPrincipals:
        - "principal://goog/subject/ADMIN_EMAIL_PLACEHOLDER"

      deniedPermissions:

      # VM Protections
        - "compute.googleapis.com/instances.setLabels"
        - "compute.googleapis.com/instances.deleteTagBinding"
       
