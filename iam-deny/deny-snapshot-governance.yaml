rules:
  - denyRule:
      deniedPrincipals:
        - "principalSet://goog/public:all"

      exceptionPrincipals:
        - "principal://goog/subject/ADMIN_EMAIL_PLACEHOLDER"

      deniedPermissions:
        - "compute.googleapis.com/snapshots.create"
        - "compute.googleapis.com/snapshots.setLabels"
