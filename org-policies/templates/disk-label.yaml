name: organizations/__ORG_ID__/customConstraints/custom.requireDiskLabels

resourceTypes:
- compute.googleapis.com/Disk

methodTypes:
- CREATE

condition: |
  !(
    'environment' in resource.labels &&
    resource.labels.environment.matches('^(__ENVIRONMENT_REGEX__)$') &&
    'owner' in resource.labels &&
    resource.labels.owner.matches('^(__OWNER_REGEX__)$') &&
    'application' in resource.labels &&
    resource.labels.application.matches('^(__APPLICATION_REGEX__)$')
  )

actionType: DENY

displayName: Require Valid Disk Labels

description: Deny disk creation unless approved environment, owner and application labels are present.