name: organizations/__ORG_ID__/customConstraints/custom.requireBucketLabels
resourceTypes:
  - storage.googleapis.com/Bucket
methodTypes:
  - CREATE
  - UPDATE
condition: |
  !(resource.labels.exists(l, l == "application") &&
    resource.labels.exists(l, l == "environment") &&
    resource.labels.exists(l, l == "owner"))
actionType: DENY
displayName: Require mandatory bucket labels
description: Deny bucket creation or update if mandatory labels are missing.
