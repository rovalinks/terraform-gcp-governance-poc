main:
  steps:
    - listTables:
        call: http.get
        args:
          url: https://bigquery.googleapis.com/bigquery/v2/projects/project-a9c3b175-7f78-4ba6-9ad/datasets/governance_inventory/tables
          auth:
            type: OAuth2
        result: tablesResponse

    - deleteOldTables:
        for:
          value: table
          in: ${default(map.get(tablesResponse.body, "tables"), [])}
          steps:
            - extractName:
                assign:
                  - tableId: ${table.tableReference.tableId}

            - checkExportTable:
                switch:
                  # Match only dynamic timestamped tables like asset_export_DD_MM_YYYY_HHMMSS
                  - condition: ${text.match_regex(tableId, "^asset_export_[0-9]{2}_[0-9]{2}_[0-9]{4}_[0-9]{6}$")}
                    next: evaluateAge
                next: continueLoop

            - evaluateAge:
                assign:
                  # Split "asset_export_DD_MM_YYYY_HHMMSS" by "_"
                  # parts[0]="asset", parts[1]="export", parts[2]=DD, parts[3]=MM, parts[4]=YYYY, parts[5]=HHMMSS
                  - parts: ${text.split(tableId, "_")}
                  - d: ${parts[2]}
                  - m: ${parts[3]}
                  - y: ${parts[4]}
                  # Break down HHMMSS
                  - hhmmss: ${parts[5]}
                  - hh: ${text.substring(hhmmss, 0, 2)}
                  - mm: ${text.substring(hhmmss, 2, 4)}
                  - ss: ${text.substring(hhmmss, 4, 6)}
                  # Parse cleanly into an exact epoch timestamp
                  - table_time: ${time.parse(y + "-" + m + "-" + d + "T" + hh + ":" + mm + ":" + ss + "Z")}
                  - time_now: ${sys.now()}
                  - age_seconds: ${time_now - table_time}

            - checkAgeCondition:
                switch:
                  # Delete if older than 1 hour (3600 seconds)
                  - condition: ${age_seconds > 3600}
                    next: deleteTable
                next: continueLoop

            - deleteTable:
                call: http.delete
                args:
                  url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/project-a9c3b175-7f78-4ba6-9ad/datasets/governance_inventory/tables/" + tableId}
                  auth:
                    type: OAuth2

            - continueLoop:
                next: endLoop

            - endLoop:
                assign:
                  - dummy: ""

    - done:
        return: "Cleanup completed successfully"
