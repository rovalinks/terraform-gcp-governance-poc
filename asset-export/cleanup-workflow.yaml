main:
  steps:
    - getContext:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}

    - listTables:
        call: http.get
        args:
          url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/" + project_id + "/datasets/governance_inventory/tables"}
          auth:
            type: OAuth2
        result: tablesResponse

    - deleteOldTables:
        for:
          value: table
          in: ${default(map.get(tablesResponse.body, "tables"), [])}
          steps:
            - extractName:
                assign:
                  - tableId: ${table.tableReference.tableId}

            - checkExportTable:
                switch:
                  - condition: ${text.match_regex(tableId, "^asset_export_[0-9]{2}_[0-9]{2}_[0-9]{4}_[0-9]{6}$")}
                    next: evaluateAge
                next: continueLoop

            - evaluateAge:
                assign:
                  - parts: ${text.split(tableId, "_")}
                  - d: ${parts[2]}
                  - m: ${parts[3]}
                  - y: ${parts[4]}
                  - hhmmss: ${parts[5]}
                  - hh: ${text.substring(hhmmss, 0, 2)}
                  - mm: ${text.substring(hhmmss, 2, 4)}
                  - ss: ${text.substring(hhmmss, 4, 6)}
                  - table_time: ${time.parse(y + "-" + m + "-" + d + "T" + hh + ":" + mm + ":" + ss + "Z")}
                  - time_now: ${sys.now()}
                  - age_seconds: ${time_now - table_time}

            - checkAgeCondition:
                switch:
                  - condition: ${age_seconds > 3600}
                    next: deleteTable
                next: continueLoop

            - deleteTable:
                call: http.delete
                args:
                  url: ${"https://bigquery.googleapis.com/bigquery/v2/projects/" + project_id + "/datasets/governance_inventory/tables/" + tableId}
                  auth:
                    type: OAuth2

            - continueLoop:
                next: endLoop

            - endLoop:
                assign:
                  - dummy: ""

    - done:
        return: "Cleanup completed successfully"
